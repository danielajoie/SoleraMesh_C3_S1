; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

;[env:seeed_xiao_esp32c3]
;platform = espressif32
;board = seeed_xiao_esp32c3
;framework = arduino
;lib_deps = madhephaestus/ESP32Servo
;monitor_speed = 115200

[env:seeed_xiao_esp32c3_usb]
;name = MeshTruck-Vehicle-Control
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
; ESP32Servo library for servo control - actively maintained version
; Required for proper servo PWM generation on ESP32-C3
lib_deps =
   madhephaestus/ESP32Servo
   adafruit/Adafruit AHTX0
   mprograms/QMC5883LCompass
;upload_protocol = esptool
;upload_port = COM29
upload_protocol = espota
upload_port = 192.168.132.169
upload_flags =
  --auth=ota_pass
monitor_speed = 115200